<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundinho Kids | Links</title>
  <link rel="icon" type="image/png" href="logo3.png">
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <main class="linktree-page">
    <div class="background-shapes">
      <span class="shape shape-1"></span>
      <span class="shape shape-2"></span>
      <span class="shape shape-3"></span>
      <span class="shape shape-4"></span>
      <span class="shape shape-5"></span>
    </div>

    <section class="card">
      <div class="logo-area">
        <!-- Troque pela sua logo -->
        <img src="logo1.png" alt="Logo Mundinho Kids" class="logo" />
      </div>

      <div class="brand-text">
        <h1>Mundinho Kids</h1>
        <p>Festa feliz é festa com Mundinho Kids!</p>
      
      </div>

      <nav class="links">
        <a class="link-btn whatsapp" href="#" target="_blank">
          <i class="fa-brands fa-whatsapp"></i>
          <span>WhatsApp</span>
        </a>

        <a class="link-btn instagram" href="#" target="_blank">
          <i class="fa-brands fa-instagram"></i>
          <span>Instagram</span>
        </a>

        <a class="link-btn catalogo" href="#" target="_blank">
          <i class="fa-solid fa-book-open"></i>
          <span>Catálogo</span>
        </a>

        <a class="link-btn visita" href="#" target="_blank">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          <span>Visita Encantada</span>
        </a>

        <a class="link-btn autismo" href="#" target="_blank">
          <i class="fa-solid fa-puzzle-piece"></i>
          <span>Compreender para Acolher</span>
        </a>


      </nav>

      <div class="footer-note">
        <p>Mundinho Kids - São José do Rio Preto</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
